services:
  vpn:
    image: qmcgaw/gluetun
    container_name: vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    ports:
      - 8888:8080
    env_file:
      - .env
    environment:
      - DOT=off
      - DNS_ADDRESS=1.1.1.1
      - DNS_ADDRESS=8.8.8.8
    volumes:
      - ./config/gluetun:/gluetun
    restart: unless-stopped

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    network_mode: service:vpn
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - ./config/sabnzbd:/config
      - /data/media:/data
    restart: unless-stopped
